spring.application.name=FarmerDocumentService
server.port=8082

# Eureka Registration
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.datasource.url=jdbc:mysql://localhost:3306/documentdb?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database Credentials
spring.datasource.username=root
spring.datasource.password=Samima@67

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Manually setting the dialect can help if the connection is flaky during startup
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.config.import=optional:configserver:http://localhost:8711

# File Storage Configuration
file.upload-dir=C:/agrigov/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB